name: Documentation

on:
  pull_request:
  push:
    branches: [main]

jobs:
  docs-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check documentation files
        run: |
          test -f README.md
          test -f docs/Architecture.md
          test -f docs/ReproducingResults.md
          test -f PUBLICATION_READINESS_REPORT.md
